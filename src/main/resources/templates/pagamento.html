<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Sistema de Vendas</title>

    <!-- CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery (apenas 1 versão) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery Mask Plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

    <style>
        .form-group { margin-bottom: 1rem; }
        .btn-pagamento { font-size: 23px; height: 50px; width: 100%; }
        .info-valor { font-size: 19px; font-weight: bold; }
        .item-produto { font-size: 11px; display: block; margin-bottom: 5px; }
        hr { color: #726868; border-top: 1px solid #726868; margin: 20px 0; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Pagamento Vendas</h1>

    <form id="formcheckout">
        <input type="hidden" th:value="${venda.id}" id="idVendaCampo">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="nome" class="form-label">Nome:</label>
                <input th:value="${venda.pessoa.nome}" type="text" class="form-control" readonly id="nome" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email:</label>
                <input th:value="${venda.pessoa.email}" type="text" class="form-control" readonly id="email" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="numerocartao" class="form-label">Número do cartão:</label>
                <input type="text" placeholder="4554 5454 5454 5454" class="form-control" id="numerocartao" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="nomecartao" class="form-label">Nome como escrito no cartão:</label>
                <input type="text" placeholder="João da Silva" class="form-control" id="nomecartao" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-3">
                <label for="cpf" class="form-label">CPF do titular:</label>
                <input th:value="${venda.pessoa.cpf}" type="text" placeholder="000.000.000-00" class="form-control" id="cpf" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="mesvalidade" class="form-label">Mês de validade:</label>
                <select class="form-select" required id="mesvalidade">
                    <option value="">Mês</option>
                    <option value="01">01 - Janeiro</option>
                    <option value="02">02 - Fevereiro</option>
                    <option value="03">03 - Março</option>
                    <option value="04">04 - Abril</option>
                    <option value="05">05 - Maio</option>
                    <option value="06">06 - Junho</option>
                    <option value="07">07 - Julho</option>
                    <option value="08">08 - Agosto</option>
                    <option value="09">09 - Setembro</option>
                    <option value="10">10 - Outubro</option>
                    <option value="11">11 - Novembro</option>
                    <option value="12">12 - Dezembro</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label for="anovalidade" class="form-label">Ano de validade:</label>
                <select class="form-select" required id="anovalidade">
                    <option value="">Ano</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label for="cvv" class="form-label">CVV:</label>
                <input type="text" placeholder="380" class="form-control" id="cvv" required maxlength="4">
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-3">
                <label for="qtdparcela" class="form-label">Número de parcelas:</label>
                <select class="form-select" required id="qtdparcela">
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="cep" class="form-label">CEP de cobrança:</label>
                <input type="text" placeholder="00000-000" class="form-control" id="cep" required>
            </div>

            <div class="col-md-4 mb-3">
                <label for="rua" class="form-label">Rua:</label>
                <input type="text" class="form-control" id="rua" required>
            </div>

            <div class="col-md-4 mb-3">
                <label for="numero" class="form-label">Número:</label>
                <input type="text" class="form-control" id="numero" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="estado" class="form-label">Estado:</label>
                <input type="text" placeholder="SP" class="form-control" id="estado" required maxlength="2">
            </div>

            <div class="col-md-6 mb-3">
                <label for="cidade" class="form-label">Cidade:</label>
                <input type="text" placeholder="Campinas" class="form-control" id="cidade" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-12">
                <button onclick="realizarPagamento();" type="button" id="buttonrealizarPagamento" class="btn btn-primary btn-pagamento">
                    Realizar Pagamento
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <span class="info-valor" th:text="'TOTAL R$: ' + ${venda.valorTotal}">TOTAL R$:</span>
            </div>
            <div class="col-md-6">
                <span class="info-valor" th:text="'DESC. R$: ' + ${venda.valorDesc}">DESC. R$:</span>
            </div>
        </div>

        <div class="row" th:if="${venda.valorfrete != null}">
            <div class="col-md-6">
                <span class="info-valor" th:text="'FRETE R$: ' + ${venda.valorfrete}">FRETE R$:</span>
            </div>
        </div>

        <hr>

        <div class="row">
            <div class="col-md-6">
                <label class="form-label fw-bold">Itens adicionados</label>
                <div th:each="p : ${venda.itemVendaLoja}">
                    <span class="item-produto" th:text="${p.produto.nome} + ' - Qtd: ' + ${p.quantidade}"></span>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    $(document).ready(function() {
        // Gerar anos dinamicamente (próximos 15 anos)
        const anoAtual = new Date().getFullYear();
        const selectAno = $('#anovalidade');
        for (let i = 0; i < 15; i++) {
            const ano = anoAtual + i;
            selectAno.append(`<option value="${ano}">${ano.toString().slice(-2)}</option>`);
        }

        // Gerar parcelas de 1 a 12
        const selectParcela = $('#qtdparcela');
        for (let i = 1; i <= 12; i++) {
            selectParcela.append(`<option value="${i}">${i} x${i > 1 ? 's' : ''}</option>`);
        }

        // Máscaras
        $('#cpf').mask('000.000.000-00', {reverse: true});
        $('#cep').mask('00000-000');
        $('#cvv').mask('0000');
        $('#numerocartao').mask('0000 0000 0000 0000');

        // Busca automática de CEP
        $('#cep').on('blur', function() {
            var cep = $(this).val().replace(/\D/g, '');

            if (cep.length === 8) {
                $('#rua').val('Buscando...');
                $('#cidade').val('Buscando...');
                $('#estado').val('...');

                $.getJSON(`https://viacep.com.br/ws/${cep}/json/`, function(dados) {
                    if (!dados.erro) {
                        $('#rua').val(dados.logradouro || '');
                        $('#cidade').val(dados.localidade || '');
                        $('#estado').val(dados.uf || '');
                        $('#numero').focus();
                    } else {
                        limpaFormularioCep();
                        alert('CEP não encontrado.');
                    }
                }).fail(function() {
                    limpaFormularioCep();
                    alert('Erro ao buscar CEP. Verifique o número informado.');
                });
            } else if (cep !== '') {
                limpaFormularioCep();
                alert('CEP inválido. Digite 8 números.');
            }
        });

        function limpaFormularioCep() {
            $('#rua, #numero, #cidade, #estado').val('');
        }

        // Evento do botão de pagamento
        $('#buttonrealizarPagamento').on('click', realizarPagamento);
    });

    function realizarPagamento() {


	  var idVendaCampo = $('#idVendaCampo').val();
	  var numerocartao = $('#numerocartao').val();
	  var nomecartao = $('#nomecartao').val();
	  var cpf = $('#cpf').val();
	  var mesvalidade = $('#mesvalidade').val();
	  var anovalidade = $('#anovalidade').val();
	  var cvv = $('#cvv').val();
	  var qtdparcela = $('#qtdparcela').val();
	  var cep = $('#cep').val();
	  var rua = $('#rua').val();
	  var numero = $('#numero').val();
	  var estado = $('#estado').val();
	  var cidade = $('#cidade').val();


	  if(cidade.trim() == ''){
		  alert('Informe a Cidade de cobrança do cartão de crédito.');
		  return;
	  }


	  if(estado.trim() == ''){
		  alert('Informe o Estado de cobrança do cartão de crédito.');
		  return;
	  }

	  if(numero.trim() == ''){
		  alert('Informe a Número de cobrança do cartão de crédito.');
		  return;
	  }

	  if(rua.trim() == ''){
		  alert('Informe a RUA de cobrança do cartão de crédito.');
		  return;
	  }


	  if(cep.trim() == ''){
		  alert('Informe CEP de cobrança do cartão de crédito.');
		  return;
	  }


	  if(cvv.trim() == ''){
		  alert('Informe CVV do cartão de crédito.');
		  return;
	  }


	  if(mesvalidade.trim() == ''){
		  alert('Informe mês de válidade do cartão de crédito.');
		  return;
	  }

	  if(numerocartao.trim() == ''){
		  alert('Informe o número do cartão de crédito.');
		  return;
	  }

	  if(nomecartao.trim() == ''){
		  alert('Informe o nome como escrito no cartão de crédito.');
		  return;
	  }

	  if(cpf.trim() == ''){
		  alert('Informe cpf do responsável pelo cartão de crédito.');
		  return;
	  }


	  var cardData = {
			cardNumber: numerocartao.replaceAll('.',""),
			holderName: nomecartao,
			securityCode: cvv,
			expirationMonth: mesvalidade,
			expirationYear: anovalidade
	  };


	  var isValidCardNumber = cardData.cardNumber !=  null;

	  if (isValidCardNumber == false){
		  alert('Número do cartão é inválido');
		  return;
	  }


	  var isValidSecurityCode = cardData.cardNumber != null &&  cvv != null;

	  if (isValidSecurityCode == false){
		  alert('Códivo CVV de segurança é inválido.');
		  return;
	  }


	  var isValidExpireDate = cardData.expirationMonth != null && cardData.expirationYear != null;

	  if (isValidExpireDate == false){
		  alert('Data de válidade é inválida');
		  return;
	  }


	  var isValidCardData =  cardData != null;


	 // console.info('isValidCardData' + isValidCardData);
	 // console.info('isValidExpireDate' + isValidExpireDate);
	 // console.info('isValidSecurityCode' + isValidSecurityCode);
	 // console.info('isValidCardNumber' + isValidCardNumber);

	  if (isValidCardData && isValidExpireDate && isValidSecurityCode && isValidCardNumber){


			document.getElementById('buttonrealizarPagamento').disabled = true;
			document.getElementById('buttonrealizarPagamento').value = 'Efetuando pagamento...';

		   $.ajax({
			   method: 'POST',
			   url: 'finalizarCompraCartao',
			   data: {
				   cardNumber: cardData.cardNumber,
				   holderName: cardData.holderName,
				   securityCode: cardData.securityCode,
				   expirationMonth: cardData.expirationMonth,
				   expirationYear: cardData.expirationYear,
				   idVendaCampo: idVendaCampo,
				   cpf: cpf,
				   qtdparcela: qtdparcela,
				   cep: cep,
				   rua: rua,
				   numero: numero,
				   estado: estado,
				   cidade: cidade
			   }
		   }).success(function (response) {

			   if (response == 'sucesso') {
			      document.getElementById('buttonrealizarPagamento').disabled = true;
			      document.getElementById('buttonrealizarPagamento').value = 'Sucesso, OK... Pago';
			   }else {

				   document.getElementById('buttonrealizarPagamento').disabled = false;
				   document.getElementById('buttonrealizarPagamento').value = 'Realizar Pagamento';

				   alert(response);
			   }

		   }).fail(function (xhr, status, errorThrown) {

			   document.getElementById('buttonrealizarPagamento').disabled = false;
			   document.getElementById('buttonrealizarPagamento').value = 'Realizar Pagamento';

			   alert('Erro ao efetuar pagamento: ' + errorThrown);
			   return;
		   });




	  }else {
		  alert('O pagamento não pode ser realizado.');
		  return;
	  }


  }
</script>
</body>
</html>
