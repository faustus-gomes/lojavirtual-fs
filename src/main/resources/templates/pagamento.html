<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento - Sistema de Vendas</title>

    <!-- CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery Mask Plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        .form-group { margin-bottom: 1rem; }
        .btn-pagamento { font-size: 23px; height: 50px; width: 100%; }
        .info-valor { font-size: 19px; font-weight: bold; }
        .item-produto { font-size: 11px; display: block; margin-bottom: 5px; }
        hr { color: #726868; border-top: 1px solid #726868; margin: 20px 0; }
        .loading { opacity: 0.6; pointer-events: none; }

        /* AULA 12.26 - Estilos para mensagens de retorno */
        .alert-success { background-color: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-top: 15px; }
        .alert-error { background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin-top: 15px; }
        .alert-warning { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; margin-top: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Pagamento Vendas</h1>

    <!-- AULA 12.26 - Área para mensagens de retorno -->
    <div id="mensagemRetorno" class="hidden"></div>

    <form id="formcheckout">
        <input type="hidden" th:value="${venda.id}" id="idVendaCampo">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="nome" class="form-label">Nome:</label>
                <input th:value="${venda.pessoa.nome}" type="text" class="form-control" readonly id="nome" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email:</label>
                <input th:value="${venda.pessoa.email}" type="text" class="form-control" readonly id="email" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="numerocartao" class="form-label">Número do cartão:</label>
                <input type="text" placeholder="4554 5454 5454 5454" class="form-control" id="numerocartao" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="nomecartao" class="form-label">Nome como escrito no cartão:</label>
                <input type="text" placeholder="João da Silva" class="form-control" id="nomecartao" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-3">
                <label for="cpf" class="form-label">CPF do titular:</label>
                <input th:value="${venda.pessoa.cpf}" type="text" placeholder="000.000.000-00" class="form-control" id="cpf" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="mesvalidade" class="form-label">Mês de validade:</label>
                <select class="form-select" required id="mesvalidade">
                    <option value="">Mês</option>
                    <option value="01">01 - Janeiro</option>
                    <option value="02">02 - Fevereiro</option>
                    <option value="03">03 - Março</option>
                    <option value="04">04 - Abril</option>
                    <option value="05">05 - Maio</option>
                    <option value="06">06 - Junho</option>
                    <option value="07">07 - Julho</option>
                    <option value="08">08 - Agosto</option>
                    <option value="09">09 - Setembro</option>
                    <option value="10">10 - Outubro</option>
                    <option value="11">11 - Novembro</option>
                    <option value="12">12 - Dezembro</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label for="anovalidade" class="form-label">Ano de validade:</label>
                <select class="form-select" required id="anovalidade">
                    <option value="">Ano</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label for="cvv" class="form-label">CVV:</label>
                <input type="text" placeholder="380" class="form-control" id="cvv" required maxlength="4">
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-3">
                <label for="qtdparcela" class="form-label">Número de parcelas:</label>
                <select class="form-select" required id="qtdparcela">
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="cep" class="form-label">CEP de cobrança:</label>
                <input type="text" placeholder="00000-000" class="form-control" id="cep" required>
            </div>

            <div class="col-md-4 mb-3">
                <label for="rua" class="form-label">Rua:</label>
                <input type="text" class="form-control" id="rua" required>
            </div>

            <div class="col-md-4 mb-3">
                <label for="numero" class="form-label">Número:</label>
                <input type="text" class="form-control" id="numero" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="estado" class="form-label">Estado:</label>
                <input type="text" placeholder="SP" class="form-control" id="estado" required maxlength="2">
            </div>

            <div class="col-md-6 mb-3">
                <label for="cidade" class="form-label">Cidade:</label>
                <input type="text" placeholder="Campinas" class="form-control" id="cidade" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-12">
                <button onclick="realizarPagamento();" type="button" id="buttonrealizarPagamento" class="btn btn-primary btn-pagamento">
                    Realizar Pagamento
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <span class="info-valor" th:text="'TOTAL R$: ' + ${venda.valorTotal}">TOTAL R$:</span>
            </div>
            <div class="col-md-6">
                <span class="info-valor" th:text="'DESC. R$: ' + ${venda.valorDesc}">DESC. R$:</span>
            </div>
        </div>

        <div class="row" th:if="${venda.valorfrete != null}">
            <div class="col-md-6">
                <span class="info-valor" th:text="'FRETE R$: ' + ${venda.valorfrete}">FRETE R$:</span>
            </div>
        </div>

        <hr>

        <div class="row">
            <div class="col-md-6">
                <label class="form-label fw-bold">Itens adicionados</label>
                <div th:each="p : ${venda.itemVendaLoja}">
                    <span class="item-produto" th:text="${p.produto.nome} + ' - Qtd: ' + ${p.quantidade}"></span>
                </div>
            </div>
        </div>
    </form>
</div>

<script type="text/javascript">
    // AULA 12.26 - Função para exibir mensagens
    function exibirMensagem(tipo, mensagem) {
        var divMensagem = $('#mensagemRetorno');
        divMensagem.removeClass('hidden alert-success alert-error alert-warning');

        if (tipo === 'sucesso') {
            divMensagem.addClass('alert-success');
        } else if (tipo === 'erro') {
            divMensagem.addClass('alert-error');
        } else {
            divMensagem.addClass('alert-warning');
        }

        divMensagem.html(mensagem);
        divMensagem.removeClass('hidden');

        // Scroll para a mensagem
        $('html, body').animate({ scrollTop: 0 }, 500);

        // Esconder após 5 segundos
        setTimeout(function() {
            divMensagem.addClass('hidden');
        }, 5000);
    }

    $(document).ready(function() {
        $('#cpf').mask('000.000.000-00', {reverse: true});
        $('#cep').mask('00000-000', {reverse: true});
        $('#cvv').mask('000', {reverse: true});
        $('#numerocartao').mask('0000.0000.0000.0000', {reverse: true});

        // Popular anos de validade
        var anoAtual = new Date().getFullYear();
        for(var i = 0; i <= 10; i++) {
            $('#anovalidade').append('<option value="' + (anoAtual + i) + '">' + (anoAtual + i) + '</option>');
        }

        // Popular parcelas
        for(var i = 1; i <= 12; i++) {
            $('#qtdparcela').append('<option value="' + i + '">' + i + 'x</option>');
        }

        // ViaCEP
        $("#cep").blur(function() {
            var cep = $(this).val().replace(/\D/g, '');
            if (cep != "") {
                var validacep = /^[0-9]{8}$/;
                if(validacep.test(cep)) {
                    $("#rua").val("...");
                    $("#cidade").val("...");
                    $("#estado").val("..");
                    $.getJSON("https://viacep.com.br/ws/"+ cep +"/json/?callback=?", function(dados) {
                        if (!("erro" in dados)) {
                            $("#rua").val(dados.logradouro);
                            $("#cidade").val(dados.localidade);
                            $("#estado").val(dados.uf);
                        } else {
                            alert("CEP não encontrado.");
                        }
                    });
                }
            }
        });
    });

    function gerarHashCartao(cardData) {
        var dadosCartao = cardData.cardNumber +
                          cardData.holderName +
                          cardData.securityCode +
                          cardData.expirationMonth +
                          cardData.expirationYear;
        var hash = CryptoJS.SHA256(dadosCartao).toString();
        return hash;
    }

    function realizarPagamento() {
        var idVendaCampo = $('#idVendaCampo').val();
        var numerocartao = $('#numerocartao').val();
        var nomecartao = $('#nomecartao').val();
        var cpf = $('#cpf').val();
        var mesvalidade = $('#mesvalidade').val();
        var anovalidade = $('#anovalidade').val();
        var cvv = $('#cvv').val();
        var qtdparcela = $('#qtdparcela').val();
        var cep = $('#cep').val();
        var rua = $('#rua').val();
        var numero = $('#numero').val();
        var estado = $('#estado').val();
        var cidade = $('#cidade').val();
        var nome = $('#nome').val();
        var email = $('#email').val();

        // Validações
        if(cidade.trim() == ''){ alert('Informe a Cidade de cobrança.'); return; }
        if(estado.trim() == ''){ alert('Informe o Estado de cobrança.'); return; }
        if(numero.trim() == ''){ alert('Informe o Número de cobrança.'); return; }
        if(rua.trim() == ''){ alert('Informe a RUA de cobrança.'); return; }
        if(cep.trim() == ''){ alert('Informe CEP de cobrança.'); return; }
        if(cvv.trim() == ''){ alert('Informe CVV do cartão.'); return; }
        if(mesvalidade.trim() == ''){ alert('Informe mês de validade.'); return; }
        if(numerocartao.trim() == ''){ alert('Informe o número do cartão.'); return; }
        if(nomecartao.trim() == ''){ alert('Informe o nome como escrito no cartão.'); return; }
        if(cpf.trim() == ''){ alert('Informe CPF do responsável.'); return; }

        var cardData = {
            cardNumber: numerocartao.replaceAll('.', ""),
            holderName: nomecartao,
            securityCode: cvv,
            expirationMonth: mesvalidade,
            expirationYear: anovalidade
        };

        var hashCartao = gerarHashCartao(cardData);

        // AULA 12.26 - Desabilitar botão e mostrar loading
        var btn = document.getElementById('buttonrealizarPagamento');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processando...';

        // AULA 12.26 - Usando o novo endpoint /comprar/cartao
        $.ajax({
            method: 'POST',
            url: '/ecommercefs/comprar/cartao',
            contentType: 'application/json',
            data: JSON.stringify({
                hashCartao: hashCartao,
                expirationMonth: cardData.expirationMonth,
                expirationYear: cardData.expirationYear,
                idVendaCampo: idVendaCampo,
                cpf: cpf,
                qtdparcela: qtdparcela,
                cep: cep,
                rua: rua,
                numero: numero,
                estado: estado,
                cidade: cidade,
                nome: nome,
                email: email
            }),
            success: function(response) {
                btn.disabled = false;
                btn.innerHTML = 'Realizar Pagamento';

                if (response.sucesso) {
                    exibirMensagem('sucesso', '✅ ' + response.mensagem);
                    if (response.status === 'CONFIRMED') {
                        setTimeout(function() {
                            window.location.href = '/ecommercefs/pagamento/sucesso';
                        }, 2000);
                    }
                } else {
                    exibirMensagem('erro', '❌ ' + response.erro);
                }
            },
            error: function(xhr) {
                btn.disabled = false;
                btn.innerHTML = 'Realizar Pagamento';

                var erro = xhr.responseJSON ? xhr.responseJSON.erro : 'Erro ao processar pagamento';
                exibirMensagem('erro', '❌ ' + erro);
            }
        });
    }
</script>
</body>
</html>
