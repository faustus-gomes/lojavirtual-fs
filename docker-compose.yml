version: '3.8'

services:
  lojavirtual-fs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netgom-api
    ports:
      - "8088:8088"
    restart: unless-stopped
    volumes:
      # Correção: mapeia para o diretório correto
      - ./uploads:/prod/uploads
    environment:
      # Opcional: variáveis de ambiente para Spring
      - TZ=America/Sao_Paulo
      - SPRING_PROFILES_ACTIVE=prod
      # Adicione outras variáveis que sua API precisa
      # - DB_HOST=postgres17
      # - DB_PORT=5432
    networks:
      - app-network
    # Healthcheck opcional
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Rede para comunicação com outros containers (ex: PostgreSQL)
networks:
  app-network:
    driver: bridge